name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install PyYAML>=6.0 pytest>=8 pytest-cov>=5
      - name: Run test suite (fast, deterministic, no network)
        run: python -m pytest --cov=orchestrator --cov-report=term-missing --cov-fail-under=90
      - name: Smoke-run the improvement loop on mock backends
        run: python -m orchestrator run --out runs/ci --save-policy runs/hardened.yaml
