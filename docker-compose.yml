# Reproducible security lab — the whole real loop in Docker.
#
#   cp .env.example .env   # fill in HiddenLayer creds + cloud vLLM endpoint
#   docker compose up -d openshell-gateway         # real OpenShell runtime
#   docker compose run --rm orchestrator           # generate → screen → harden
#
# The gateway enforces policy at the kernel level (seccomp / Landlock / network
# namespaces). The orchestrator (our code) generates bypass prompts on the cloud
# vLLM, screens them through live HiddenLayer, hardens the OpenShell policy, and
# writes the report — all backends via .env. vLLM is cloud-hosted (macOS can't
# run it locally). Mock backends are for the test suite, not deployment.

# Clean project prefix (instead of the directory-derived "2026july").
name: cdht

services:
  # One-shot: generate the sandbox-JWT signing keys the gateway needs.
  # NOTE: the state dir is a HOST bind mount (not a named volume) so the gateway
  # can share per-sandbox JWT token files with the sibling sandbox containers it
  # spawns via the Docker socket — a named volume breaks that sharing.
  openshell-jwt-init:
    image: ghcr.io/nvidia/openshell/gateway:latest
    container_name: cdht-openshell-jwt-init
    user: "0"
    entrypoint:
      - /usr/local/bin/openshell-gateway
      - generate-certs
      - --output-dir=/var/lib/openshell/tls
      - --server-san=127.0.0.1
      - --server-san=localhost
      - --server-san=host.openshell.internal
    volumes:
      - type: bind
        source: /var/lib/openshell
        target: /var/lib/openshell
        bind:
          create_host_path: true
    restart: "no"

  # The real OpenShell gateway (prebuilt image). Spawns sandbox containers via
  # the host Docker socket; enforces the loaded policy.yaml for real.
  openshell-gateway:
    image: ghcr.io/nvidia/openshell/gateway:latest
    container_name: cdht-openshell-gateway
    command: []              # clear default CMD so gateway.toml bind wins
    user: "0"
    depends_on:
      openshell-jwt-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: /var/lib/openshell
        target: /var/lib/openshell
        bind:
          create_host_path: true
      - ./deploy/openshell/gateway.toml:/etc/openshell/gateway.toml:ro
    environment:
      OPENSHELL_GATEWAY_CONFIG: /etc/openshell/gateway.toml
      OPENSHELL_DB_URL: "sqlite:/var/lib/openshell/gateway.db?mode=rwc"
      XDG_DATA_HOME: /var/lib/openshell
      HOME: /var/lib/openshell
    extra_hosts:
      - "host.openshell.internal:host-gateway"
    restart: unless-stopped

  # Our code — the security-improvement loop, containerized. Generates bypass
  # prompts on the cloud vLLM, screens them through live HiddenLayer, hardens the
  # OpenShell policy on the real gateway, iterates, and writes the report.
  # All backends + credentials come from .env (LLM=nemotron on the cloud vLLM,
  # ASSESSOR=hiddenlayer, SANDBOX=openshell). vLLM is hosted in the cloud — macOS
  # can't run it locally — so there is no local vllm service.
  orchestrator:
    build: .
    image: cdht-orchestrator
    container_name: cdht-orchestrator
    depends_on:
      - openshell-gateway
    env_file:
      - path: .env
        required: true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runs:/app/runs
      - ./policies:/app/policies

  # Light web UI to browse run reports at http://localhost:8090 (a daemon).
  web:
    build: .
    image: cdht-orchestrator
    container_name: cdht-web
    command: ["serve", "--host", "0.0.0.0", "--port", "8090"]
    ports:
      - "8090:8090"
    volumes:
      - ./runs:/app/runs
    restart: unless-stopped
