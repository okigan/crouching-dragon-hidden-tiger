# Reproducible security lab: real NVIDIA OpenShell gateway + orchestrator.
#
#   docker compose up openshell-gateway     # real OpenShell sandbox runtime
#   docker compose up orchestrator          # the loop (needs backends via .env)
#
# The gateway enforces policy at the kernel level (seccomp / Landlock / network
# namespaces). HiddenLayer + vLLM are selected/credentialed via .env
# (see .env.example). Mock backends are for the test suite, not deployment.

services:
  # One-shot: generate the sandbox-JWT signing keys the gateway needs.
  # NOTE: the state dir is a HOST bind mount (not a named volume) so the gateway
  # can share per-sandbox JWT token files with the sibling sandbox containers it
  # spawns via the Docker socket — a named volume breaks that sharing.
  openshell-jwt-init:
    image: ghcr.io/nvidia/openshell/gateway:latest
    user: "0"
    entrypoint:
      - /usr/local/bin/openshell-gateway
      - generate-certs
      - --output-dir=/var/lib/openshell/tls
      - --server-san=127.0.0.1
      - --server-san=localhost
      - --server-san=host.openshell.internal
    volumes:
      - type: bind
        source: /var/lib/openshell
        target: /var/lib/openshell
        bind:
          create_host_path: true
    restart: "no"

  # The real OpenShell gateway (prebuilt image). Spawns sandbox containers via
  # the host Docker socket; enforces the loaded policy.yaml for real.
  openshell-gateway:
    image: ghcr.io/nvidia/openshell/gateway:latest
    command: []              # clear default CMD so gateway.toml bind wins
    user: "0"
    depends_on:
      openshell-jwt-init:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8080:8080"
      - "127.0.0.1:8081:8081"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - type: bind
        source: /var/lib/openshell
        target: /var/lib/openshell
        bind:
          create_host_path: true
      - ./deploy/openshell/gateway.toml:/etc/openshell/gateway.toml:ro
    environment:
      OPENSHELL_GATEWAY_CONFIG: /etc/openshell/gateway.toml
      OPENSHELL_DB_URL: "sqlite:/var/lib/openshell/gateway.db?mode=rwc"
      XDG_DATA_HOME: /var/lib/openshell
      HOME: /var/lib/openshell
    extra_hosts:
      - "host.openshell.internal:host-gateway"
    restart: unless-stopped

  # The security-improvement loop. Talks to the gateway (real OpenShell), and to
  # HiddenLayer + vLLM per .env. Mocks are test-only; a deployment sets real
  # backends. Requires the OpenShell adapter wiring (in progress).
  orchestrator:
    build: .
    depends_on:
      - openshell-gateway
    env_file:
      - path: .env
        required: false
    environment:
      SANDBOX: openshell
      OPENSHELL_GATEWAY_ENDPOINT: http://host.docker.internal:8080
      OPENSHELL_GATEWAY_INSECURE: "true"
      # ASSESSOR=hiddenlayer / LLM=nemotron + credentials come from .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./runs:/app/runs
      - ./policies:/app/policies

  # Optional: self-host Nemotron on vLLM (GPU). Opt-in profile. For dev we point
  # NEMOTRON_BASE_URL at an existing endpoint via .env instead.
  vllm:
    image: vllm/vllm-openai:latest
    profiles: ["gpu"]
    command: >
      --model nvidia/Nemotron-4-340B-Instruct
      --served-model-name nemotron
    ports:
      - "8000:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
